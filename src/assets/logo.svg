<svg width="240" height="80" viewBox="0 0 240 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium gradients -->
    <linearGradient id="suitcaseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f7cff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b6eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2854ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="planeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6b8aff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f7cff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textMainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1d29;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3142;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f7cff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b8aff;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle shadow filters -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4f7cff" flood-opacity="0.15"/>
    </filter>
    <filter id="iconShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <!-- Enhanced Suitcase Icon -->
  <g transform="translate(15, 23)" filter="url(#iconShadow)">
    <!-- Main body with rounded corners -->
    <rect x="2" y="10" width="22" height="18" rx="3" fill="url(#suitcaseGrad)" stroke="#2854ff" stroke-width="0.5"/>
    
    <!-- Handle with better curve -->
    <path d="M 8 10 Q 8 5 13 5 Q 18 5 18 10" fill="none" stroke="#2854ff" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Elegant details -->
    <rect x="4" y="14" width="18" height="0.8" rx="0.4" fill="#ffffff" opacity="0.3"/>
    <rect x="4" y="20" width="18" height="0.8" rx="0.4" fill="#ffffff" opacity="0.2"/>
    
    <!-- Premium wheels -->
    <circle cx="6" cy="29" r="2" fill="#2c3e50" stroke="#34495e" stroke-width="0.5"/>
    <circle cx="20" cy="29" r="2" fill="#2c3e50" stroke="#34495e" stroke-width="0.5"/>
    <circle cx="6" cy="29" r="1" fill="#7f8c8d"/>
    <circle cx="20" cy="29" r="1" fill="#7f8c8d"/>
  </g>
  
  <!-- Clear connection line between suitcase and plane -->
  <path d="M 42 40 L 62 40" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Friendly Passenger Aircraft -->
  <g transform="translate(62, 23)" filter="url(#iconShadow)">
    <!-- Rounded fuselage like commercial aircraft -->
    <ellipse cx="16" cy="12" rx="16" ry="3" fill="url(#planeGrad)" stroke="#4f7cff" stroke-width="0.5"/>
    
    <!-- Gentle swept wings -->
    <ellipse cx="12" cy="12" rx="3.5" ry="8" fill="url(#planeGrad)" opacity="0.9"/>
    <ellipse cx="12" cy="12" rx="2.5" ry="6" fill="#ffffff" opacity="0.25"/>
    
    <!-- Tail fin - rounded -->
    <path d="M 2 12 Q 0 8 4 10 L 6 12 Q 4 14 0 16 Q 2 12 2 12" fill="url(#planeGrad)"/>
    
    <!-- Passenger windows -->
    <circle cx="20" cy="11" r="0.8" fill="#ffffff" opacity="0.9"/>
    <circle cx="22" cy="11" r="0.8" fill="#ffffff" opacity="0.9"/>
    <circle cx="24" cy="11" r="0.8" fill="#ffffff" opacity="0.9"/>
    <circle cx="26" cy="11" r="0.8" fill="#ffffff" opacity="0.9"/>
    
    <!-- Cockpit windows -->
    <ellipse cx="28" cy="11.5" rx="2" ry="1.2" fill="#ffffff" opacity="0.8"/>
    
    <!-- Engine under wing -->
    <ellipse cx="12" cy="16" rx="2" ry="3" fill="#6b8aff" opacity="0.8"/>
    <ellipse cx="12" cy="16" rx="1.3" ry="2" fill="#ffffff" opacity="0.3"/>
  </g>
  
  <!-- Elegant Typography -->
  <g transform="translate(110, 5)">
    <!-- "Bagless Travel" as one elegant text block -->
    <text x="0" y="28" 
          font-family="'Playfair Display', 'Georgia', serif" 
          font-size="24" 
          font-weight="600" 
          fill="url(#accentGrad)" 
          letter-spacing="-0.8px"
          filter="url(#softShadow)">
      Bagless
    </text>
    
    <text x="0" y="50" 
          font-family="'SF Pro Display', 'Inter', sans-serif" 
          font-size="13" 
          font-weight="300" 
          fill="url(#accentGrad)"
          letter-spacing="4px"
          style="text-transform: uppercase;">
      Travel
    </text>
  </g>
</svg>